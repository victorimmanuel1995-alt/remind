<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f2f2f7" />
<title>Reminders</title>
<style>
  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --card-2: #ffffff;
    --text: #000000;
    --text-2: #8a8a8e;
    --text-3: #c4c4c6;
    --separator: rgba(60,60,67,0.12);
    --fill: #e9e9eb;
    --blue: #007aff;
    --red: #ff3b30;
    --orange: #ff9500;
    --yellow: #ffcc00;
    --green: #34c759;
    --teal: #30b0c7;
    --purple: #af52de;
    --pink: #ff2d55;
    --brown: #a2845e;
    --gray: #8e8e93;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --card-2: #2c2c2e;
      --text: #ffffff;
      --text-2: #98989f;
      --text-3: #48484a;
      --separator: rgba(84,84,88,0.4);
      --fill: #2c2c2e;
      --shadow: none;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 17px;
    line-height: 1.3;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
  .app { min-height: 100%; max-width: 700px; margin: 0 auto; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }

  /* ---------- Home (lists overview) ---------- */
  .home { padding: 8px 16px 100px; }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: var(--fill); border-radius: 10px;
    padding: 8px 12px; margin: 8px 0 18px;
    color: var(--text-2);
  }
  .search input { border: none; background: none; outline: none; flex: 1; color: var(--text); font-size: 17px; }
  .search svg { width: 17px; height: 17px; flex: none; }

  .smart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 26px; }
  .smart-tile {
    background: var(--card); border-radius: 14px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 22px; text-align: left;
    box-shadow: var(--shadow); transition: transform .12s ease;
  }
  .smart-tile:active { transform: scale(0.97); }
  .smart-top { display: flex; align-items: center; justify-content: space-between; }
  .smart-icon {
    width: 30px; height: 30px; border-radius: 50%;
    display: grid; place-items: center; color: #fff; flex: none;
  }
  .smart-icon svg { width: 17px; height: 17px; }
  .smart-count { font-size: 20px; font-weight: 700; color: var(--text); }
  .smart-label { font-size: 15px; font-weight: 600; color: var(--text-2); }

  .section-head {
    font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
    margin: 4px 4px 10px; color: var(--text);
  }
  .list-group { background: var(--card); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); }
  .list-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; width: 100%; text-align: left;
    border-bottom: 0.5px solid var(--separator); position: relative;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:active { background: var(--fill); }
  .list-dot {
    width: 30px; height: 30px; border-radius: 50%;
    display: grid; place-items: center; color: #fff; flex: none; font-size: 16px;
  }
  .list-dot svg { width: 16px; height: 16px; }
  .list-name { flex: 1; font-size: 17px; }
  .list-num { color: var(--text-2); font-size: 17px; margin-right: 4px; }
  .chev { color: var(--text-3); }
  .chev svg { width: 13px; height: 13px; }

  .add-list-btn {
    display: flex; align-items: center; gap: 12px;
    color: var(--blue); font-size: 17px; padding: 16px 4px; width: 100%;
    font-weight: 400;
  }
  .add-list-btn .plus {
    width: 26px; height: 26px; border-radius: 50%; background: var(--blue);
    display: grid; place-items: center; color: #fff; font-size: 20px; line-height: 1;
  }

  /* ---------- List detail ---------- */
  .detail { display: none; flex-direction: column; min-height: 100vh; }
  .detail.active { display: flex; }
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; position: sticky; top: 0;
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    z-index: 20;
  }
  .nav-back { display: flex; align-items: center; gap: 3px; color: var(--blue); font-size: 17px; }
  .nav-back svg { width: 18px; height: 18px; }
  .nav-btn { color: var(--blue); font-size: 17px; padding: 4px 6px; }
  .detail-body { padding: 4px 20px 120px; flex: 1; }
  .detail-title { font-size: 34px; font-weight: 800; letter-spacing: -0.5px; margin: 4px 0 18px; }

  .task {
    display: flex; gap: 12px; padding: 9px 0;
    border-bottom: 0.5px solid var(--separator); align-items: flex-start;
  }
  .task:last-child { border-bottom: none; }
  .circle {
    width: 22px; height: 22px; border-radius: 50%; flex: none; margin-top: 1px;
    border: 1.8px solid var(--text-3); position: relative; transition: all .15s ease;
  }
  .circle.done { border-color: var(--acc); }
  .circle.done::after {
    content: ""; position: absolute; inset: 3px; border-radius: 50%; background: var(--acc);
  }
  .task-main { flex: 1; min-width: 0; }
  .task-title-row { display: flex; align-items: baseline; gap: 6px; }
  .prio { color: var(--acc); font-weight: 700; flex: none; }
  .task-text { flex: 1; word-break: break-word; }
  .task.completed .task-text { color: var(--text-2); }
  .task-notes { color: var(--text-2); font-size: 15px; margin-top: 2px; word-break: break-word; }
  .task-meta { display: flex; align-items: center; gap: 10px; margin-top: 3px; font-size: 14px; color: var(--text-2); flex-wrap: wrap; }
  .task-meta .overdue { color: var(--red); }
  .task-meta .flag { color: var(--orange); }
  .task-meta svg { width: 12px; height: 12px; vertical-align: -1px; }
  .info-btn { color: var(--text-3); padding: 2px 4px; flex: none; align-self: center; }
  .info-btn svg { width: 22px; height: 22px; }

  .add-task-bar {
    display: flex; align-items: center; gap: 12px; color: var(--acc);
    padding: 14px 0 6px; font-size: 17px; width: 100%;
  }
  .add-task-bar .plus {
    width: 24px; height: 24px; border-radius: 50%; background: var(--acc);
    display: grid; place-items: center; color: #fff; font-size: 18px; line-height: 1;
  }
  .completed-header {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 15px; color: var(--text-2); margin: 20px 0 4px; font-weight: 600;
  }
  .completed-header button { color: var(--blue); font-size: 15px; }
  .empty-state { text-align: center; color: var(--text-3); padding: 60px 20px; font-size: 20px; font-weight: 600; }

  /* quick add inline */
  .quick-add { display: flex; gap: 12px; padding: 9px 0; align-items: center; }
  .quick-add .circle { opacity: .4; }
  .quick-add input {
    flex: 1; border: none; outline: none; background: none; font-size: 17px; color: var(--text);
  }

  /* ---------- Modals / sheets ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: none; align-items: flex-end; justify-content: center; z-index: 100;
  }
  .overlay.active { display: flex; }
  @media (min-width: 500px){ .overlay.active { align-items: center; } }
  .sheet {
    background: var(--bg); width: 100%; max-width: 500px;
    border-radius: 16px 16px 0 0; padding: 8px 0 max(16px, env(safe-area-inset-bottom));
    animation: slideUp .25s ease;
  }
  @media (min-width: 500px){ .sheet { border-radius: 16px; margin: 0 12px; } }
  @keyframes slideUp { from { transform: translateY(100%);} to { transform: translateY(0);} }
  .sheet-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
  .sheet-nav .title { font-size: 17px; font-weight: 700; }
  .sheet-nav button { color: var(--blue); font-size: 17px; }
  .sheet-nav button.primary { font-weight: 700; }
  .sheet-nav button:disabled { color: var(--text-3); }

  .field-group { background: var(--card); border-radius: 12px; margin: 10px 16px; overflow: hidden; }
  .field {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    border-bottom: 0.5px solid var(--separator);
  }
  .field:last-child { border-bottom: none; }
  .field label { color: var(--text); flex: none; width: 92px; }
  .field input[type=text], .field textarea, .field input[type=datetime-local] {
    flex: 1; border: none; outline: none; background: none; font-size: 17px; color: var(--text); min-width: 0;
  }
  .field textarea { resize: none; min-height: 26px; }
  .field .toggle-flag { margin-left: auto; }

  .switch { position: relative; width: 51px; height: 31px; flex: none; }
  .switch input { display: none; }
  .switch .track { position: absolute; inset: 0; background: var(--fill); border-radius: 16px; transition: .2s; }
  .switch input:checked + .track { background: var(--green); }
  .switch .knob { position: absolute; top: 2px; left: 2px; width: 27px; height: 27px; border-radius: 50%; background: #fff; transition: .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .switch input:checked + .track + .knob { transform: translateX(20px); }

  .seg { display: flex; background: var(--fill); border-radius: 9px; padding: 2px; margin-left: auto; }
  .seg button { padding: 4px 12px; border-radius: 7px; font-size: 14px; color: var(--text); font-weight: 500; }
  .seg button.active { background: var(--card-2); box-shadow: 0 1px 3px rgba(0,0,0,.12); }

  /* color + icon pickers */
  .picker-title { font-size: 13px; color: var(--text-2); margin: 18px 16px 8px; text-transform: none; }
  .swatches, .icons { display: flex; flex-wrap: wrap; gap: 14px; padding: 4px 16px; }
  .swatch { width: 40px; height: 40px; border-radius: 50%; position: relative; }
  .swatch.sel::after { content:""; position:absolute; inset:-4px; border:2.5px solid var(--text); border-radius:50%; }
  .icon-opt {
    width: 46px; height: 46px; border-radius: 50%; background: var(--card);
    display: grid; place-items: center; font-size: 22px; color: var(--text-2);
  }
  .icon-opt.sel { background: var(--sel-color); color: #fff; }
  .icon-opt svg { width: 22px; height: 22px; }

  .list-preview-icon {
    width: 74px; height: 74px; border-radius: 50%; margin: 8px auto 4px;
    display: grid; place-items: center; color: #fff;
  }
  .list-preview-icon svg { width: 38px; height: 38px; }
  .name-field { text-align: center; }
  .name-field input { text-align: center; font-size: 22px; font-weight: 600; width: 100%; border:none; outline:none; background:none; color: var(--acc); }

  .delete-list-btn {
    background: var(--card); color: var(--red); width: calc(100% - 32px);
    margin: 20px 16px 0; padding: 14px; border-radius: 12px; font-size: 17px; text-align: center;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,30,.95); color: #fff; padding: 10px 18px; border-radius: 20px;
    font-size: 15px; opacity: 0; transition: all .25s ease; z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div class="home" id="home">
    <div class="search">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 2a6 6 0 104.472 10.03l3.748 3.75a1 1 0 001.415-1.415l-3.75-3.748A6 6 0 008 2zm0 2a4 4 0 110 8 4 4 0 010-8z"/></svg>
      <input id="searchInput" type="text" placeholder="Search" />
    </div>

    <div class="smart-grid" id="smartGrid"></div>

    <div class="section-head">My Lists</div>
    <div class="list-group" id="listGroup"></div>
    <button class="add-list-btn" id="addListBtn">
      <span class="plus">+</span> Add List
    </button>
  </div>

  <!-- LIST DETAIL -->
  <div class="detail" id="detail">
    <div class="nav">
      <button class="nav-back" id="backBtn">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l-6 6 6 6"/></svg>
        Lists
      </button>
      <button class="nav-btn" id="editListBtn">Edit</button>
    </div>
    <div class="detail-body">
      <h1 class="detail-title" id="detailTitle"></h1>
      <div id="taskList"></div>
      <button class="add-task-bar" id="addTaskBar">
        <span class="plus">+</span> New Reminder
      </button>
      <div id="completedSection"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<!-- OVERLAY / SHEETS -->
<div class="overlay" id="overlay"></div>

<script>
/* ============================ Data ============================ */
const STORE_KEY = "reminders_app_v1";
const ICONS = {
  list:  '<svg viewBox="0 0 20 20" fill="currentColor"><rect x="3" y="4" width="14" height="2.4" rx="1.2"/><rect x="3" y="9" width="14" height="2.4" rx="1.2"/><rect x="3" y="14" width="14" height="2.4" rx="1.2"/></svg>',
  today: '<svg viewBox="0 0 20 20" fill="currentColor"><path d="M6 2v2H4a2 2 0 00-2 2v9a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2V2h-2v2H8V2H6zm10 6v7H4V8h12z"/></svg>',
  clock: '<svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm0 2a6 6 0 110 12 6 6 0 010-12zm-1 2v4.4l3.3 2 .8-1.3-2.6-1.6V6H9z"/></svg>',
  flag:  '<svg viewBox="0 0 20 20" fill="currentColor"><path d="M5 2a1 1 0 011 1v1.2l1.5-.4c1.6-.5 2.9-.2 4.4.3 1.3.4 2.1.6 3 .4a1 1 0 011.1 1v6a1 1 0 01-.7 1c-1.4.4-2.6.1-4-.3-1.3-.4-2.1-.6-3-.4l-2.3.6V18a1 1 0 11-2 0V3a1 1 0 011-1z"/></svg>',
  all:   '<svg viewBox="0 0 20 20" fill="currentColor"><rect x="2.5" y="4" width="15" height="12" rx="2.2"/><rect x="4.5" y="6.2" width="11" height="1.6" rx=".8" fill="var(--card)"/><rect x="4.5" y="9.2" width="11" height="1.6" rx=".8" fill="var(--card)"/><rect x="4.5" y="12.2" width="7" height="1.6" rx=".8" fill="var(--card)"/></svg>',
  check: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10.5l4 4 8-9"/></svg>',
  home:  '🏠', cart: '🛒', briefcase: '💼', book: '📖', heart: '❤️', star: '⭐',
  gift: '🎁', plane: '✈️', dumbbell: '🏋️', pill: '💊', cross: '✝️', code: '💻'
};
const COLORS = ["#ff3b30","#ff9500","#ffcc00","#34c759","#30b0c7","#007aff","#af52de","#ff2d55","#a2845e","#8e8e93"];
const ICON_KEYS = ["list","home","cart","briefcase","book","heart","star","gift","plane","dumbbell","pill","cross","code"];

let state = load();

function load(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  // seed
  return {
    lists: [
      { id: uid(), name: "Reminders", color: "#007aff", icon: "list" },
      { id: uid(), name: "Shopping", color: "#ff9500", icon: "cart" },
    ],
    tasks: []
  };
}
function save(){
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ toast("Couldn't save — storage blocked"); }
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ============================ Helpers ============================ */
function iconHTML(key){
  const v = ICONS[key] || ICONS.list;
  return v.startsWith("<svg") ? v : `<span style="font-size:16px">${v}</span>`;
}
function iconBigHTML(key){
  const v = ICONS[key] || ICONS.list;
  return v.startsWith("<svg") ? v : `<span style="font-size:34px">${v}</span>`;
}
function startOfToday(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function endOfToday(){ const d=new Date(); d.setHours(23,59,59,999); return d.getTime(); }
function fmtDate(ts){
  const d = new Date(ts), now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const tmr = new Date(); tmr.setDate(now.getDate()+1);
  const time = d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  const hasTime = !(d.getHours()===0 && d.getMinutes()===0);
  let day;
  if (sameDay) day = "Today";
  else if (d.toDateString() === tmr.toDateString()) day = "Tomorrow";
  else day = d.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
  return hasTime ? `${day}, ${time}` : day;
}

/* ============================ Home render ============================ */
function renderHome(){
  const active = state.tasks.filter(t => !t.completed);
  const smart = [
    { key:"today", label:"Today", color:"var(--blue)", icon:"today",
      count: active.filter(t=>t.due && t.due <= endOfToday()).length, filter:"today" },
    { key:"scheduled", label:"Scheduled", color:"var(--red)", icon:"clock",
      count: active.filter(t=>t.due).length, filter:"scheduled" },
    { key:"all", label:"All", color:"var(--gray)", icon:"all",
      count: active.length, filter:"all" },
    { key:"flagged", label:"Flagged", color:"var(--orange)", icon:"flag",
      count: active.filter(t=>t.flagged).length, filter:"flagged" },
  ];
  document.getElementById("smartGrid").innerHTML = smart.map(s => `
    <button class="smart-tile" data-smart="${s.filter}">
      <div class="smart-top">
        <span class="smart-icon" style="background:${s.color}">${ICONS[s.icon]}</span>
        <span class="smart-count">${s.count}</span>
      </div>
      <span class="smart-label">${s.label}</span>
    </button>`).join("");

  document.getElementById("listGroup").innerHTML = state.lists.map(l => {
    const n = state.tasks.filter(t=>t.listId===l.id && !t.completed).length;
    return `<button class="list-row" data-list="${l.id}">
      <span class="list-dot" style="background:${l.color}">${iconHTML(l.icon)}</span>
      <span class="list-name">${escapeHTML(l.name)}</span>
      <span class="list-num">${n}</span>
      <span class="chev"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5l5 5-5 5"/></svg></span>
    </button>`;
  }).join("") || `<div style="padding:16px;color:var(--text-2)">No lists yet</div>`;
}

function escapeHTML(s){ return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================ Navigation ============================ */
let currentListId = null;   // real list id, or null for smart
let currentSmart = null;    // "today" | "scheduled" | "all" | "flagged"

function openList(listId){
  currentListId = listId; currentSmart = null;
  renderDetail(); show("detail");
}
function openSmart(filter){
  currentSmart = filter; currentListId = null;
  renderDetail(); show("detail");
}
function show(which){
  document.getElementById("home").style.display = which==="home" ? "block":"none";
  document.getElementById("detail").classList.toggle("active", which==="detail");
  window.scrollTo(0,0);
}

/* ============================ Detail render ============================ */
function currentTasks(){
  if (currentListId){
    return state.tasks.filter(t=>t.listId===currentListId);
  }
  const active = state.tasks;
  if (currentSmart==="today")     return active.filter(t=>t.due && t.due<=endOfToday());
  if (currentSmart==="scheduled") return active.filter(t=>t.due);
  if (currentSmart==="flagged")   return active.filter(t=>t.flagged);
  return active; // all
}
function currentAccent(){
  if (currentListId) return listById(currentListId)?.color || "#007aff";
  return ({today:"#007aff", scheduled:"#ff3b30", flagged:"#ff9500", all:"#8e8e93"})[currentSmart] || "#007aff";
}
function currentTitle(){
  if (currentListId) return listById(currentListId)?.name || "";
  return ({today:"Today", scheduled:"Scheduled", flagged:"Flagged", all:"All"})[currentSmart] || "";
}
function listById(id){ return state.lists.find(l=>l.id===id); }

function renderDetail(){
  const acc = currentAccent();
  const detail = document.getElementById("detail");
  detail.style.setProperty("--acc", acc);
  const title = document.getElementById("detailTitle");
  title.textContent = currentTitle();
  title.style.color = acc;

  // Edit only for real lists
  document.getElementById("editListBtn").style.visibility = currentListId ? "visible" : "hidden";
  // Add bar only for real lists
  document.getElementById("addTaskBar").style.display = currentListId ? "flex" : "none";

  const tasks = currentTasks();
  const active = tasks.filter(t=>!t.completed).sort(sortTasks);
  const completed = tasks.filter(t=>t.completed).sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));

  const listEl = document.getElementById("taskList");
  if (active.length===0 && completed.length===0){
    listEl.innerHTML = `<div class="empty-state">No Reminders</div>`;
  } else {
    listEl.innerHTML = active.map(taskHTML).join("");
  }

  const comp = document.getElementById("completedSection");
  if (completed.length){
    comp.innerHTML = `
      <div class="completed-header">
        <span>${completed.length} Completed</span>
        <button id="clearCompleted">Clear</button>
      </div>
      ${completed.map(taskHTML).join("")}`;
  } else comp.innerHTML = "";
}

function sortTasks(a,b){
  if (!!a.due !== !!b.due) return a.due ? -1 : 1;
  if (a.due && b.due) return a.due - b.due;
  return (a.createdAt||0) - (b.createdAt||0);
}

function taskHTML(t){
  const prio = t.priority ? `<span class="prio">${"!".repeat(t.priority)}</span>` : "";
  const overdue = t.due && t.due < startOfToday() && !t.completed;
  const meta = [];
  if (t.due) meta.push(`<span class="${overdue?'overdue':''}">${fmtDate(t.due)}</span>`);
  if (t.flagged) meta.push(`<span class="flag">${ICONS.flag}</span>`);
  // show list name when in a smart list
  if (!currentListId){
    const l = listById(t.listId);
    if (l) meta.push(`<span style="color:${l.color}">${escapeHTML(l.name)}</span>`);
  }
  return `<div class="task ${t.completed?'completed':''}" data-id="${t.id}">
    <button class="circle ${t.completed?'done':''}" data-toggle="${t.id}"></button>
    <div class="task-main" data-edit="${t.id}">
      <div class="task-title-row">${prio}<span class="task-text">${escapeHTML(t.title)}</span></div>
      ${t.notes ? `<div class="task-notes">${escapeHTML(t.notes)}</div>` : ""}
      ${meta.length ? `<div class="task-meta">${meta.join("")}</div>` : ""}
    </div>
    <button class="info-btn" data-edit="${t.id}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9.2"/><line x1="12" y1="11" x2="12" y2="16.5" stroke-linecap="round"/><circle cx="12" cy="7.8" r="1.1" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>`;
}

/* ============================ Task actions ============================ */
function toggleTask(id){
  const t = state.tasks.find(x=>x.id===id); if(!t) return;
  t.completed = !t.completed;
  t.completedAt = t.completed ? Date.now() : null;
  save(); renderDetail(); renderHome();
}
function addTask(title){
  const t = title.trim(); if(!t || !currentListId) return;
  state.tasks.push({
    id: uid(), listId: currentListId, title: t, notes:"",
    due:null, flagged:false, priority:0, completed:false, completedAt:null, createdAt:Date.now()
  });
  save(); renderDetail(); renderHome();
}
function clearCompleted(){
  const ids = currentTasks().filter(t=>t.completed).map(t=>t.id);
  state.tasks = state.tasks.filter(t=>!ids.includes(t.id));
  save(); renderDetail(); renderHome();
}

/* ============================ Inline quick-add ============================ */
function startQuickAdd(){
  if(!currentListId) return;
  const bar = document.getElementById("addTaskBar");
  const acc = currentAccent();
  const wrap = document.createElement("div");
  wrap.className = "quick-add";
  wrap.innerHTML = `<span class="circle" style="--acc:${acc}"></span><input type="text" placeholder="New Reminder" />`;
  bar.parentNode.insertBefore(wrap, bar);
  bar.style.display = "none";
  const input = wrap.querySelector("input");
  input.focus();
  function commit(keepGoing){
    const v = input.value.trim();
    if (v) addTask(v);
    if (keepGoing && v){ startQuickAdd(); }
    else { bar.style.display = currentListId ? "flex":"none"; }
    wrap.remove();
  }
  input.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); commit(true);} });
  input.addEventListener("blur", ()=> setTimeout(()=>commit(false), 100));
}

/* ============================ Edit task sheet ============================ */
function editTask(id){
  const t = state.tasks.find(x=>x.id===id); if(!t) return;
  const dt = t.due ? toLocalInput(t.due) : "";
  const html = `
    <div class="sheet">
      <div class="sheet-nav">
        <button data-close>Cancel</button>
        <span class="title">Details</span>
        <button class="primary" data-save>Done</button>
      </div>
      <div class="field-group">
        <div class="field"><input id="e-title" type="text" placeholder="Title" value="${escapeAttr(t.title)}" /></div>
        <div class="field"><textarea id="e-notes" placeholder="Notes" rows="2">${escapeHTML(t.notes||"")}</textarea></div>
      </div>
      <div class="field-group">
        <div class="field">
          <label>Date & time</label>
          <input id="e-due" type="datetime-local" value="${dt}" />
        </div>
        <div class="field">
          <label>Flag</label>
          <span class="switch"><input id="e-flag" type="checkbox" ${t.flagged?"checked":""}/><span class="track"></span><span class="knob"></span></span>
        </div>
        <div class="field">
          <label>Priority</label>
          <div class="seg" id="e-prio">
            ${[["None",0],["!",1],["!!",2],["!!!",3]].map(([lbl,v])=>
              `<button data-p="${v}" class="${t.priority===v?'active':''}">${lbl}</button>`).join("")}
          </div>
        </div>
      </div>
      <div class="field-group">
        <div class="field" style="color:var(--red);justify-content:center;" data-delete>Delete Reminder</div>
      </div>
    </div>`;
  openSheet(html, sheet=>{
    let prio = t.priority;
    sheet.querySelectorAll("#e-prio button").forEach(b=>{
      b.onclick = ()=>{ prio = +b.dataset.p; sheet.querySelectorAll("#e-prio button").forEach(x=>x.classList.remove("active")); b.classList.add("active"); };
    });
    sheet.querySelector("[data-save]").onclick = ()=>{
      const title = sheet.querySelector("#e-title").value.trim();
      if(!title){ closeSheet(); return; }
      t.title = title;
      t.notes = sheet.querySelector("#e-notes").value.trim();
      const dv = sheet.querySelector("#e-due").value;
      t.due = dv ? new Date(dv).getTime() : null;
      t.flagged = sheet.querySelector("#e-flag").checked;
      t.priority = prio;
      save(); renderDetail(); renderHome(); closeSheet();
    };
    sheet.querySelector("[data-delete]").onclick = ()=>{
      state.tasks = state.tasks.filter(x=>x.id!==t.id);
      save(); renderDetail(); renderHome(); closeSheet(); toast("Reminder deleted");
    };
  });
}
function toLocalInput(ts){
  const d = new Date(ts - new Date().getTimezoneOffset()*60000);
  return d.toISOString().slice(0,16);
}
function escapeAttr(s){ return escapeHTML(s).replace(/"/g,"&quot;"); }

/* ============================ List add / edit sheet ============================ */
function listSheet(existing){
  const editing = !!existing;
  let color = existing?.color || COLORS[5];
  let icon  = existing?.icon  || "list";
  const html = `
    <div class="sheet">
      <div class="sheet-nav">
        <button data-close>Cancel</button>
        <span class="title">${editing?"List Info":"New List"}</span>
        <button class="primary" data-save>Done</button>
      </div>
      <div class="list-preview-icon" id="prev" style="background:${color}">${iconBigHTML(icon)}</div>
      <div class="field-group name-field">
        <div class="field" style="justify-content:center;">
          <input id="l-name" type="text" placeholder="List Name" value="${escapeAttr(existing?.name||"")}" style="color:${color}" />
        </div>
      </div>
      <div class="picker-title">COLOR</div>
      <div class="swatches" id="swatches">
        ${COLORS.map(c=>`<button class="swatch ${c===color?'sel':''}" data-c="${c}" style="background:${c}"></button>`).join("")}
      </div>
      <div class="picker-title">ICON</div>
      <div class="icons" id="icons" style="--sel-color:${color}">
        ${ICON_KEYS.map(k=>`<button class="icon-opt ${k===icon?'sel':''}" data-i="${k}">${iconHTML(k)}</button>`).join("")}
      </div>
      ${editing?`<button class="delete-list-btn" data-delete-list>Delete List</button>`:""}
    </div>`;
  openSheet(html, sheet=>{
    const prev = sheet.querySelector("#prev");
    const nameInput = sheet.querySelector("#l-name");
    nameInput.focus();
    function refresh(){
      prev.style.background = color;
      prev.innerHTML = iconBigHTML(icon);
      nameInput.style.color = color;
      sheet.querySelector("#icons").style.setProperty("--sel-color", color);
    }
    sheet.querySelectorAll(".swatch").forEach(b=>b.onclick=()=>{
      color=b.dataset.c;
      sheet.querySelectorAll(".swatch").forEach(x=>x.classList.remove("sel")); b.classList.add("sel");
      refresh();
    });
    sheet.querySelectorAll(".icon-opt").forEach(b=>b.onclick=()=>{
      icon=b.dataset.i;
      sheet.querySelectorAll(".icon-opt").forEach(x=>x.classList.remove("sel")); b.classList.add("sel");
      refresh();
    });
    sheet.querySelector("[data-save]").onclick=()=>{
      const name = nameInput.value.trim() || "New List";
      if (editing){ existing.name=name; existing.color=color; existing.icon=icon; }
      else { const l={id:uid(),name,color,icon}; state.lists.push(l); currentListId=l.id; }
      save(); renderHome();
      if (editing) renderDetail();
      else openList(currentListId);
      closeSheet();
    };
    const del = sheet.querySelector("[data-delete-list]");
    if (del) del.onclick=()=>{
      state.tasks = state.tasks.filter(t=>t.listId!==existing.id);
      state.lists = state.lists.filter(l=>l.id!==existing.id);
      save(); renderHome(); closeSheet(); show("home"); toast("List deleted");
    };
  });
}

/* ============================ Sheet machinery ============================ */
function openSheet(html, setup){
  const ov = document.getElementById("overlay");
  ov.innerHTML = html;
  ov.classList.add("active");
  const sheet = ov.querySelector(".sheet");
  ov.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeSheet);
  ov.onclick = e=>{ if(e.target===ov) closeSheet(); };
  if (setup) setup(sheet);
}
function closeSheet(){
  const ov = document.getElementById("overlay");
  ov.classList.remove("active");
  ov.innerHTML = "";
}

/* ============================ Toast ============================ */
let toastTimer;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 1800);
}

/* ============================ Search ============================ */
function runSearch(q){
  q = q.trim().toLowerCase();
  const grid = document.getElementById("smartGrid");
  const group = document.getElementById("listGroup");
  const heads = document.querySelectorAll(".section-head");
  if (!q){ renderHome(); grid.style.display=""; document.getElementById("addListBtn").style.display=""; heads.forEach(h=>h.style.display=""); return; }
  grid.style.display="none";
  document.getElementById("addListBtn").style.display="none";
  heads.forEach(h=>h.style.display="none");
  const hits = state.tasks.filter(t=>t.title.toLowerCase().includes(q) || (t.notes||"").toLowerCase().includes(q));
  group.innerHTML = hits.length ? hits.map(t=>{
    const l = listById(t.listId);
    return `<button class="list-row" data-search-task="${t.id}" data-list-of="${t.listId}">
      <span class="circle ${t.completed?'done':''}" style="--acc:${l?.color||'#007aff'};margin:0"></span>
      <span class="list-name">${escapeHTML(t.title)}</span>
      <span class="list-num" style="color:${l?.color}">${escapeHTML(l?.name||"")}</span>
    </button>`;
  }).join("") : `<div style="padding:16px;color:var(--text-2)">No results</div>`;
}

/* ============================ Events ============================ */
document.addEventListener("click", e=>{
  const smart = e.target.closest("[data-smart]");
  if (smart){ openSmart(smart.dataset.smart); return; }
  const listRow = e.target.closest("[data-list]");
  if (listRow){ openList(listRow.dataset.list); return; }
  const searchTask = e.target.closest("[data-search-task]");
  if (searchTask){ openList(searchTask.dataset.listOf); document.getElementById("searchInput").value=""; return; }

  const toggle = e.target.closest("[data-toggle]");
  if (toggle){ toggleTask(toggle.dataset.toggle); return; }
  const edit = e.target.closest("[data-edit]");
  if (edit){ editTask(edit.dataset.edit); return; }
  if (e.target.id==="clearCompleted"){ clearCompleted(); return; }
});
document.getElementById("backBtn").onclick = ()=>{ show("home"); renderHome(); };
document.getElementById("addTaskBar").onclick = startQuickAdd;
document.getElementById("addListBtn").onclick = ()=> listSheet(null);
document.getElementById("editListBtn").onclick = ()=>{ if(currentListId) listSheet(listById(currentListId)); };
document.getElementById("searchInput").addEventListener("input", e=> runSearch(e.target.value));

/* ============================ Init ============================ */
renderHome();
show("home");
</script>
</body>
</html>
